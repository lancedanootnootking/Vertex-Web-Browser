# Advanced Web Browser Configuration

browser:
  default_homepage: "https://www.google.com"
  theme: "dark"
  enable_javascript: true
  enable_cookies: true
  enable_plugins: true
  default_zoom: 1.0
  restore_last_session: true

security:
  enable_ad_blocker: true
  enforce_https: true
  block_trackers: true
  enable_private_browsing: false
  clear_history_on_exit: false
  block_malicious_domains: true

ai:
  enable_suggestions: true
  suggestion_provider: "local"
  max_suggestions: 5
  cache_suggestions: true
  learning_enabled: true

extensions:
  enabled: true
  auto_update: true
  allowed_extensions: []
  blocked_extensions: []

network:
  user_agent: "AdvancedWebBrowser/1.0"
  timeout: 30
  max_concurrent_requests: 10
  proxy_enabled: false
  proxy_host: ""
  proxy_port: ""

cache:
  enabled: true
  max_size_mb: 500
  cache_duration_hours: 24
  compress_cache: true

database:
  type: "sqlite"
  path: "browser_data.db"
  backup_enabled: true
  backup_interval_hours: 24

ui:
  window_width: 1200
  window_height: 800
  tab_position: "top"
  show_bookmarks_bar: true
  show_status_bar: true
  animations_enabled: true

logging:
  level: "INFO"
  file: "browser.log"
  max_size_mb: 10
  backup_count: 5
