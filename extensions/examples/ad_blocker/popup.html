<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 10px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .stats {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .primary {
            background: #007acc;
            color: white;
        }
        
        .secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .danger {
            background: #dc3545;
            color: white;
        }
        
        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Simple Ad Blocker</h3>
    </div>
    
    <div class="stats">
        <div class="stat-item">
            <span>Ads Blocked:</span>
            <span id="blockedCount">0</span>
        </div>
        <div class="stat-item">
            <span>Blocked Domains:</span>
            <span id="domainCount">0</span>
        </div>
        <div class="stat-item">
            <span>Whitelisted:</span>
            <span id="whitelistCount">0</span>
        </div>
    </div>
    
    <div class="buttons">
        <button class="primary" onclick="openOptions()">Options</button>
        <button class="secondary" onclick="toggleCurrentSite()">
            <span id="toggleText">Block Current Site</span>
        </button>
        <button class="secondary" onclick="resetStats()">Reset Stats</button>
        <button class="danger" onclick="disableExtension()">Disable</button>
    </div>
    
    <div class="status" id="status"></div>
    
    <script src="popup.js"></script>
</body>
</html>
